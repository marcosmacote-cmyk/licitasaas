<html lang="en">

    <title>LicitaSaaS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // UNREGISTER old service worker and clear all caches
      // The old SW was cache-first for JS assets, causing stale code after deploys
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(r => r.unregister());
          console.log('[SW] Unregistered all service workers');
        });
        caches.keys().then(names => {
          names.forEach(n => caches.delete(n));
          if (names.length > 0) console.log('[SW] Cleared caches:', names);
        });
      }
    </script>
  </body>
</html>
