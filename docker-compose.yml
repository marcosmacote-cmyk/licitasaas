version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: licitasaas-db
    restart: always
    environment:
      POSTGRES_USER: licitasaas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-licitasaaspassword}
      POSTGRES_DB: licitasaas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U licitasaas" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: licitasaas-app
    restart: always
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      PROCESS_ROLE: api
      DATABASE_URL: postgresql://licitasaas:${POSTGRES_PASSWORD:-licitasaaspassword}@db:5432/licitasaas?schema=public
      JWT_SECRET: ${JWT_SECRET:-troque-por-uma-chave-segura-em-producao}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      STORAGE_TYPE: LOCAL
    volumes:
      - uploads_data:/app/server/uploads
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: licitasaas-worker
    restart: always
    environment:
      NODE_ENV: production
      PROCESS_ROLE: worker
      DATABASE_URL: postgresql://licitasaas:${POSTGRES_PASSWORD:-licitasaaspassword}@db:5432/licitasaas?schema=public
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      WORKER_HEALTH_PORT: 3002
      # Notifications (shared with API)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  uploads_data:
